name: Release

# Pushing any v* tag builds Clippy.app at that version, signs the zip with
# the Sparkle EdDSA key, publishes a GitHub Release, and refreshes appcast.xml
# on main so running apps see the update.
#
# workflow_dispatch lets you kick off a release from the Actions tab or via:
#   gh workflow run release.yml -f version=0.3.0
# On dispatch the job derives VERSION from the input, creates the tag (if it
# does not already exist) using GITHUB_TOKEN, and pushes it. That tag push
# does NOT fire a second run of this workflow because GitHub Actions documents
# that events triggered by GITHUB_TOKEN do not create new workflow runs (except
# workflow_dispatch/repository_dispatch). Source:
#   https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/triggering-a-workflow#triggering-a-workflow-from-a-workflow
on:
    push:
        tags: ["v0.7.2"]
    workflow_dispatch:
        inputs:
            version:
                description: "Version to release (e.g. 0.7.2)"
                required: true
                type: string

permissions:
    contents: write

env:
    # Pin the Sparkle CLI tools; keep loosely in sync with Package.swift.
    SPARKLE_VERSION: 2.9.3
    # Opt in to Node 24 for JavaScript actions ahead of the runner default change.
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
    release:
        runs-on: macos-15
        steps:
            - name: Derive VERSION
              # For a tag push, strip the leading "v" from the ref name.
              # For a manual dispatch, take the input directly.
              # Either way VERSION is available to every subsequent step.
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                      echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
                  else
                      echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
                  fi

            # On dispatch we need to create (and push) the tag so the GitHub
            # Release can reference it. fetch-depth: 0 is required so we have
            # the full history needed for git tag; ref: main ensures we check
            # out the branch tip, not a detached tag ref (relevant on dispatch).
            # The GITHUB_TOKEN push of this tag does NOT retrigger the workflow
            # (documented behavior - see header comment above).
            - name: Checkout
              uses: actions/checkout@v6.0.3
              with:
                  fetch-depth: 0
                  ref: main

            - name: Create and push tag (dispatch only)
              if: github.event_name == 'workflow_dispatch'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  TAG="v${{ inputs.version }}"
                  if git rev-parse "$TAG" >/dev/null 2>&1; then
                      echo "Tag $TAG already exists locally, skipping creation"
                  elif git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
                      echo "Tag $TAG already exists on remote, fetching"
                      git fetch origin "$TAG"
                  else
                      git tag "$TAG"
                      git push origin "$TAG"
                      echo "Created and pushed tag $TAG"
                  fi

            # ---------------------------------------------------------------
            # Preflight: fail early with a clear message rather than silently
            # producing a broken release later.
            # ---------------------------------------------------------------
            - name: Preflight checks
              env:
                  SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
                  MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
                  MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
                  ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
                  ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
                  ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
              run: |
                  FAIL=0
                  check_secret() {
                      if [ -z "${!1}" ]; then
                          echo "::error::$1 secret is not set" >&2
                          FAIL=1
                      fi
                  }
                  check_secret SPARKLE_ED_PRIVATE_KEY
                  check_secret MACOS_CERT_P12_BASE64
                  check_secret MACOS_CERT_PASSWORD
                  check_secret ASC_KEY_P8
                  check_secret ASC_KEY_ID
                  check_secret ASC_ISSUER_ID
                  if [ ! -f "assets/AppIcon.icns" ]; then
                      echo "::error::assets/AppIcon.icns not found in checkout - build will fail" >&2
                      FAIL=1
                  fi
                  [ "$FAIL" -eq 0 ] || exit 1

            - name: Run tests
              run: swift test

            - name: Build app bundle
              run: REQUIRE_SPARKLE=1 scripts/make-app.sh "$VERSION"

            # ---------------------------------------------------------------
            # Developer ID signing with hardened runtime.
            #
            # A throwaway keychain is used so the CI runner's login keychain
            # is never touched and the certificate is removed on cleanup.
            # The identity name is resolved dynamically from the imported cert
            # so we never hardcode a team ID or CN in the workflow.
            #
            # Signing order: innermost components first per Apple's nested code
            # signing requirements. make-app.sh handles the ordering when
            # CODESIGN_IDENTITY is set.
            # ---------------------------------------------------------------
            - name: Import Developer ID certificate and sign app
              env:
                  MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
                  MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
              run: |
                  # Write the .p12 to a temp file.
                  P12_PATH="$RUNNER_TEMP/devid.p12"
                  printf '%s' "$MACOS_CERT_P12_BASE64" | base64 --decode > "$P12_PATH"

                  # Create a throwaway keychain with a random password.
                  KC_PATH="$RUNNER_TEMP/ci-signing.keychain-db"
                  KC_PASS="$(openssl rand -hex 16)"
                  security create-keychain -p "$KC_PASS" "$KC_PATH"
                  security set-keychain-settings -lut 21600 "$KC_PATH"
                  security unlock-keychain -p "$KC_PASS" "$KC_PATH"

                  # Import the certificate into the throwaway keychain.
                  security import "$P12_PATH" -k "$KC_PATH" -P "$MACOS_CERT_PASSWORD" \
                      -T /usr/bin/codesign -T /usr/bin/security
                  rm -f "$P12_PATH"

                  # Allow codesign to use the key without an interactive prompt.
                  security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PASS" "$KC_PATH"

                  # Add to the search list so codesign can find it by identity name.
                  security list-keychains -d user -s "$KC_PATH" $(security list-keychains -d user | tr -d '"')

                  # Resolve the identity name from what was just imported.
                  # "Developer ID Application" certs have that substring in the CN.
                  IDENTITY=$(security find-identity -v -p codesigning "$KC_PATH" \
                      | grep "Developer ID Application" \
                      | head -1 \
                      | sed 's/.*"\(.*\)"/\1/')
                  if [ -z "$IDENTITY" ]; then
                      echo "::error::Could not find a Developer ID Application identity in the imported certificate" >&2
                      exit 1
                  fi
                  echo "Using signing identity: $IDENTITY"
                  echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
                  echo "CI_KC_PATH=$KC_PATH" >> "$GITHUB_ENV"
                  echo "CI_KC_PASS=$KC_PASS" >> "$GITHUB_ENV"

                  # Sign the already-assembled bundle. make-app.sh skips rebuilding
                  # swift sources when invoked a second time (the binary exists);
                  # CODESIGN_IDENTITY triggers the full nested Developer ID signing path.
                  CODESIGN_IDENTITY="$IDENTITY" REQUIRE_SPARKLE=1 scripts/make-app.sh "$VERSION"

            # Always clean up the throwaway keychain, even if a prior step failed.
            - name: Remove throwaway keychain
              if: always()
              run: |
                  if [ -n "${CI_KC_PATH:-}" ]; then
                      security delete-keychain "$CI_KC_PATH" || true
                  fi

            # ---------------------------------------------------------------
            # Notarization: zip -> submit -> wait -> staple -> re-zip.
            #
            # The EdDSA signature and appcast length/checksum MUST be computed
            # on the final re-zipped artifact (after stapling). Stapling embeds
            # the notarization ticket in the .app, which changes its bytes and
            # therefore changes the zip. Computing EdDSA on the pre-staple zip
            # would produce a signature that does not match the published file.
            # ---------------------------------------------------------------
            - name: Zip signed app for notarization submission
              run: ditto -c -k --keepParent "build/Clippy.app" "build/Clippy-$VERSION-unsigned.zip"

            - name: Notarize app
              env:
                  ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
                  ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
                  ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
              run: |
                  # Write the .p8 to a temp file; notarytool requires a file path.
                  ASC_KEY_PATH="$RUNNER_TEMP/asc-key.p8"
                  printf '%s' "$ASC_KEY_P8" > "$ASC_KEY_PATH"

                  xcrun notarytool submit "build/Clippy-$VERSION-unsigned.zip" \
                      --key "$ASC_KEY_PATH" \
                      --key-id "$ASC_KEY_ID" \
                      --issuer "$ASC_ISSUER_ID" \
                      --wait \
                      --timeout 30m

                  rm -f "$ASC_KEY_PATH"

            - name: Staple notarization ticket to app
              run: |
                  xcrun stapler staple "build/Clippy.app"
                  # Confirm Gatekeeper accepts the stapled app before publishing.
                  spctl --assess --type execute --verbose "build/Clippy.app"
                  xcrun stapler validate "build/Clippy.app"

            - name: Zip stapled app (final release artifact)
              run: |
                  rm -f "build/Clippy-$VERSION-unsigned.zip"
                  ditto -c -k --keepParent "build/Clippy.app" "build/Clippy-$VERSION.zip"

            - name: Download Sparkle tools
              run: |
                  curl -sSfL -o /tmp/sparkle.tar.xz \
                    "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VERSION/Sparkle-$SPARKLE_VERSION.tar.xz"
                  mkdir -p /tmp/sparkle-dist
                  tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle-dist

            # EdDSA signature is computed on the final (stapled) zip.
            - name: Sign update zip
              env:
                  SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
              run: |
                  SIGNATURE=$(printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | \
                    /tmp/sparkle-dist/bin/sign_update "build/Clippy-$VERSION.zip" --ed-key-file -)
                  echo "SIGNATURE=$SIGNATURE" >> "$GITHUB_ENV"

            - name: Generate appcast
              run: |
                  scripts/make-appcast.sh "$VERSION" \
                    "https://github.com/${{ github.repository }}/releases/download/v$VERSION/Clippy-$VERSION.zip" \
                    "$SIGNATURE" \
                    "$RUNNER_TEMP/appcast.xml"

            # ---------------------------------------------------------------
            # Publish: idempotent. If a release for this tag already exists
            # (e.g. the user pre-created it in the GitHub UI), upload/replace
            # the asset on it. If it does not exist, create it. Either way
            # we verify the asset is attached before succeeding.
            # ---------------------------------------------------------------
            - name: Publish GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  TAG="v$VERSION"
                  ASSET="build/Clippy-$VERSION.zip"

                  if gh release view "$TAG" >/dev/null 2>&1; then
                      echo "Release $TAG already exists - uploading/replacing asset"
                      gh release upload "$TAG" "$ASSET" --clobber
                  else
                      echo "Creating release $TAG"
                      gh release create "$TAG" "$ASSET" \
                        --title "Clippy v$VERSION" \
                        --generate-notes \
                        --notes "Drag Clippy.app to Applications. This release is Developer ID signed and notarized - Gatekeeper opens it cleanly. Existing installs update in-app automatically."
                  fi

                  # Verify the asset is actually attached before we move on.
                  # A missing asset means the upload silently failed somehow.
                  ASSET_NAME="Clippy-$VERSION.zip"
                  ATTACHED=$(gh release view "$TAG" --json assets \
                    --jq ".assets[] | select(.name == \"$ASSET_NAME\") | .name" 2>/dev/null || true)
                  if [ -z "$ATTACHED" ]; then
                      echo "::error::Asset $ASSET_NAME was not found on release $TAG after upload - something went wrong" >&2
                      exit 1
                  fi
                  echo "Verified: $ASSET_NAME is attached to $TAG"

            # The appcast goes live only after the release asset exists, so
            # update checks never point at a download that is not there yet.
            # On both tag-push and dispatch paths, we commit to main explicitly
            # (the "git switch -C main" below ensures we are on the branch, not
            # a detached tag ref, which would make the push fail or go nowhere).
            - name: Commit appcast to main
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git fetch origin main
                  git switch -C main origin/main
                  cp "$RUNNER_TEMP/appcast.xml" appcast.xml
                  git add appcast.xml
                  git commit -m "chore: appcast for v$VERSION"
                  # Retry once if another push landed on main while this job ran.
                  git push origin main || { git pull --rebase origin main && git push origin main; }
