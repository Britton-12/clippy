<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Clippy hotkeys and actions">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1130" cy="120" r="220" fill="#22d3ee" fill-opacity="0.18"/>
  <circle cx="190" cy="620" r="250" fill="#f59e0b" fill-opacity="0.18"/>

  <rect x="100" y="90" width="1080" height="540" rx="30" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.24" filter="url(#shadow)"/>

  <text x="150" y="165" fill="#ffffff" font-size="54" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-weight="700">Keyboard first workflow</text>
  <text x="150" y="210" fill="#dbeafe" font-size="24" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Open, search, pin, edit, and paste without leaving the keyboard.</text>

  <g transform="translate(150,260)">
    <rect width="270" height="70" rx="14" fill="#0f172a" fill-opacity="0.7" stroke="#22d3ee" stroke-opacity="0.7"/>
    <text x="20" y="45" fill="#e0f2fe" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">Cmd+Shift+V</text>
    <text x="300" y="45" fill="#ffffff" font-size="24" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Open panel</text>
  </g>

  <g transform="translate(150,350)">
    <rect width="170" height="70" rx="14" fill="#0f172a" fill-opacity="0.7" stroke="#38bdf8" stroke-opacity="0.7"/>
    <text x="20" y="45" fill="#e0f2fe" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">Cmd+E</text>
    <text x="200" y="45" fill="#ffffff" font-size="24" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Edit clip</text>
  </g>

  <g transform="translate(150,440)">
    <rect width="170" height="70" rx="14" fill="#0f172a" fill-opacity="0.7" stroke="#facc15" stroke-opacity="0.7"/>
    <text x="20" y="45" fill="#fef9c3" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">Cmd+P</text>
    <text x="200" y="45" fill="#ffffff" font-size="24" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Pin clip</text>
  </g>

  <g transform="translate(640,265)">
    <rect width="420" height="270" rx="20" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.3"/>
    <text x="28" y="52" fill="#ffffff" font-size="28" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">Quick flow</text>
    <text x="28" y="95" fill="#dbeafe" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">1. Open at caret</text>
    <text x="28" y="135" fill="#dbeafe" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">2. Type to search</text>
    <text x="28" y="175" fill="#dbeafe" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">3. Return to paste</text>
    <text x="28" y="215" fill="#dbeafe" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">4. Shift+Return for alternate mode</text>
  </g>
</svg>
