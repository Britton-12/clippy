<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Clippy settings overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="96" y="72" width="1088" height="576" rx="30" fill="#ecfeff" fill-opacity="0.1" stroke="#99f6e4" stroke-opacity="0.4" filter="url(#shadow)"/>

  <text x="148" y="146" fill="#ffffff" font-size="52" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-weight="700">Settings that actually matter</text>
  <text x="148" y="188" fill="#d1fae5" font-size="24" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Tune behavior, appearance, capture, and integrations in one place.</text>

  <g transform="translate(148,240)">
    <rect width="220" height="66" rx="14" fill="#ffffff" fill-opacity="0.18" stroke="#ccfbf1"/>
    <text x="24" y="42" fill="#ecfeff" font-size="28" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">General</text>

    <rect x="0" y="82" width="220" height="66" rx="14" fill="#ffffff" fill-opacity="0.1" stroke="#99f6e4" stroke-opacity="0.8"/>
    <text x="24" y="124" fill="#ecfeff" font-size="28" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Appearance</text>

    <rect x="0" y="164" width="220" height="66" rx="14" fill="#ffffff" fill-opacity="0.1" stroke="#99f6e4" stroke-opacity="0.8"/>
    <text x="24" y="206" fill="#ecfeff" font-size="28" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Capture</text>

    <rect x="0" y="246" width="220" height="66" rx="14" fill="#ffffff" fill-opacity="0.1" stroke="#99f6e4" stroke-opacity="0.8"/>
    <text x="24" y="288" fill="#ecfeff" font-size="28" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Integrations</text>
  </g>

  <g transform="translate(410,240)">
    <rect width="710" height="340" rx="20" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.3"/>

    <text x="28" y="54" fill="#ffffff" font-size="30" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">Appearance preview</text>

    <text x="28" y="102" fill="#d1fae5" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Theme: System</text>
    <text x="28" y="138" fill="#d1fae5" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Panel material: Glass</text>
    <text x="28" y="174" fill="#d1fae5" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Card color mode: By source app</text>

    <text x="28" y="228" fill="#ffffff" font-size="24" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Accent palette</text>
    <circle cx="70" cy="274" r="18" fill="#22d3ee"/>
    <circle cx="120" cy="274" r="18" fill="#f59e0b"/>
    <circle cx="170" cy="274" r="18" fill="#f43f5e"/>
    <circle cx="220" cy="274" r="18" fill="#34d399"/>
    <circle cx="270" cy="274" r="18" fill="#a78bfa"/>
    <circle cx="320" cy="274" r="18" fill="#f97316"/>
  </g>
</svg>
