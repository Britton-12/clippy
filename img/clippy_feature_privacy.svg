<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Clippy privacy and local storage">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3f1d7a"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="100" y="80" width="1080" height="560" rx="30" fill="#ffffff" fill-opacity="0.1" stroke="#ddd6fe" stroke-opacity="0.45" filter="url(#shadow)"/>

  <text x="150" y="155" fill="#ffffff" font-size="52" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-weight="700">Private by design</text>
  <text x="150" y="198" fill="#ede9fe" font-size="24" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Captured data stays on your Mac, with app-level ignore and hidden-type protections.</text>

  <g transform="translate(150,245)">
    <rect width="470" height="330" rx="22" fill="#111827" fill-opacity="0.5" stroke="#c4b5fd" stroke-opacity="0.6"/>
    <text x="30" y="56" fill="#ffffff" font-size="30" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">Filtered types</text>
    <text x="30" y="102" fill="#ddd6fe" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">- ConcealedType</text>
    <text x="30" y="138" fill="#ddd6fe" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">- TransientType</text>
    <text x="30" y="174" fill="#ddd6fe" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">- AutoGeneratedType</text>

    <text x="30" y="236" fill="#ffffff" font-size="30" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">Storage</text>
    <text x="30" y="280" fill="#ddd6fe" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">~/Library/Application Support/Clippy</text>
  </g>

  <g transform="translate(670,245)">
    <rect width="460" height="330" rx="22" fill="#ffffff" fill-opacity="0.14" stroke="#ddd6fe" stroke-opacity="0.5"/>
    <circle cx="230" cy="134" r="90" fill="#a78bfa" fill-opacity="0.35"/>
    <rect x="170" y="96" width="120" height="100" rx="16" fill="#0f172a" stroke="#ddd6fe" stroke-width="4"/>
    <rect x="194" y="72" width="72" height="38" rx="16" fill="#0f172a" stroke="#ddd6fe" stroke-width="4"/>

    <text x="40" y="248" fill="#ffffff" font-size="26" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-weight="600">Zero cloud by default</text>
    <text x="40" y="286" fill="#ede9fe" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">Sync and encryption are opt-in roadmap items.</text>
  </g>
</svg>
